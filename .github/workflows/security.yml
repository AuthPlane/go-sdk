name: Security Audit

# Runs govulncheck against each module, checking their resolved
# dependency trees (and call graphs) for known vulnerabilities. Any
# finding fails the build.

on:
  pull_request:
    paths:
      - "**/go.mod"
      - "**/go.sum"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/security.yml"
  push:
    branches:
      - main
    paths:
      - "**/go.mod"
      - "**/go.sum"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/security.yml"
  schedule:
    # Mondays 06:00 UTC — after dependabot runs.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - core
          - http
          - mcp
          - mark3labs
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25.x"
          # Force fetching the latest patch matching 1.25.x even when an older
          # patch is pre-installed on the runner. Without this, govulncheck
          # flags fixed-upstream stdlib CVEs because the runner's cached
          # toolchain trails by one or two patch versions.
          check-latest: true
          cache-dependency-path: "${{ matrix.module }}/go.sum"

      - name: Install govulncheck
        # Pinned to a tagged release rather than @latest so the toolchain is
        # reproducible and the build can't be moved by an upstream retag.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck
        # Exits non-zero on any known vulnerability in the module's call graph
        # (not just its dep graph — call-reachability-aware).
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...
